name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run offline test suite
        env:
          NAKAZASEN_SKIP_LIVE: "1"
        run: python -m pytest -q

      - name: Compile and audit repository
        run: |
          python -m compileall -q src scripts
          python scripts/audit_docs_quality.py
          python scripts/audit_local_paths.py
          python scripts/audit_positioning.py
          python scripts/audit_text_encoding.py

      - name: Check release metadata
        if: matrix.python-version == '3.12'
        run: python scripts/release_check.py 0.3.0

      - name: Build package
        run: python -m build

      - name: Install built wheel smoke
        run: |
          python -m pip install --force-reinstall dist/*.whl
          python scripts/install_smoke.py
